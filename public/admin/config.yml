backend:
  name: github
  repo: poetic-design-net/feiste-dialoge
  branch: main
  base_url: https://www.feiste-dialoge.de
  auth_endpoint: api/auth

publish_mode: editorial_workflow
media_folder: "public/uploads"
public_folder: "/uploads"

site_url: https://www.feiste-dialoge.de
display_url: https://www.feiste-dialoge.de
logo_url: /favicon.svg
locale: de

collections:
  # ─── PROJEKTE ─────────────────────────────────────────────────────────────
  - name: projects
    label: "Projekte"
    label_singular: "Projekt"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{year}} · {{title}} ({{role}})"
    sortable_fields: ["order", "year", "title"]
    view_filters:
      - label: "Highlights"
        field: highlight
        pattern: true
      - label: "Featured"
        field: featured
        pattern: true
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Untertitel", name: "subtitle", widget: "string", required: false }
      - { label: "Jahr", name: "year", widget: "string", hint: "z. B. 2024 oder 2023-2024" }
      - { label: "Genre", name: "genre", widget: "string", hint: "z. B. Krimi / Thriller" }
      - { label: "Rolle / Tätigkeit", name: "role", widget: "string", hint: "z. B. Drehbuch, Dialogbuch, Dramaturgie" }
      - { label: "Studio / Produktion", name: "studio", widget: "string", required: false }
      - { label: "Sprachfassung", name: "language", widget: "string", required: false, hint: "z. B. EN → DE" }
      - { label: "Synchron-Art", name: "syncType", widget: "string", required: false, hint: "z. B. Lippensynchron, Voice-Over" }
      - label: "Leistungen"
        name: "services"
        widget: "list"
        required: false
        default: []
        field: { label: "Leistung", name: "service", widget: "string" }
      - label: "Status"
        name: "status"
        widget: "select"
        default: "abgeschlossen"
        options: ["veröffentlicht", "in-produktion", "abgeschlossen"]
      - { label: "Featured (auf Startseite)", name: "featured", widget: "boolean", default: false }
      - { label: "Highlight (Portfolio-Galerie)", name: "highlight", widget: "boolean", default: false }
      - { label: "Sortierung (kleinere Zahl = weiter oben)", name: "order", widget: "number", default: 0, value_type: "int" }
      - { label: "Hero-Bild", name: "heroImage", widget: "image", required: false, choose_url: false }
      - { label: "Hero-Bild Alt-Text", name: "heroImageAlt", widget: "string", required: false }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false, choose_url: false }
      - { label: "Thumbnail Alt-Text", name: "thumbnailAlt", widget: "string", required: false }
      - { label: "Kurzbeschreibung", name: "description", widget: "text", hint: "1-3 Absätze für die Sidebar" }
      - label: "Skript-Auszug (optional)"
        name: "scriptSnippet"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Kopfzeile", name: "header", widget: "string", required: false, hint: "z. B. FOLGE 01 — SZENE 07" }
          - { label: "Seitenzahl", name: "page", widget: "string", required: false, hint: "z. B. SEITE 42" }
          - label: "Dialog-Blöcke"
            name: "dialogues"
            widget: "list"
            summary: "{{character}} — {{line}}"
            fields:
              - { label: "Figur", name: "character", widget: "string" }
              - { label: "Regieanweisung", name: "direction", widget: "string", required: false }
              - { label: "Text", name: "line", widget: "text" }
          - { label: "Schluss-Regieanweisung", name: "actionNote", widget: "string", required: false }
      - label: "Post-it Notiz (optional)"
        name: "postit"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Text", name: "text", widget: "text" }
          - { label: "Autor", name: "author", widget: "string", required: false }
      - label: "Videos (optional)"
        name: "videos"
        widget: "list"
        required: false
        default: []
        collapsed: true
        summary: "{{title}}"
        fields:
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Untertitel", name: "subtitle", widget: "string", required: false }
          - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
          - { label: "Thumbnail Alt", name: "thumbnailAlt", widget: "string", required: false }
          - { label: "URL (YouTube/Vimeo)", name: "url", widget: "string", required: false }
      - label: "Bilder-Galerie (optional)"
        name: "gallery"
        widget: "list"
        required: false
        default: []
        collapsed: true
        summary: "{{alt}}"
        hint: "Zusätzliche Bilder zum Projekt (Behind-the-Scenes, Skript-Scans, Set-Fotos). Werden in einer Galerie mit Lightbox angezeigt."
        fields:
          - { label: "Bild", name: image, widget: image }
          - { label: "Alt-Text (für Screenreader)", name: alt, widget: string, required: false }
          - { label: "Bildunterschrift", name: caption, widget: string, required: false }
      - label: "SEO & Social Sharing"
        name: seo
        widget: object
        required: false
        collapsed: true
        summary: "{{metaTitle}}"
        fields:
          - { label: "Meta-Titel", name: metaTitle, widget: string, required: false, hint: "50–60 Zeichen. Fallback: Projekt-Titel." }
          - { label: "Meta-Beschreibung", name: metaDescription, widget: text, required: false, hint: "150–160 Zeichen. Fallback: Kurzbeschreibung." }
          - { label: "Teilen-Bild (Open Graph)", name: ogImage, widget: image, required: false, hint: "1200×630 px empfohlen." }
          - { label: "Von Suchmaschinen ausschließen (noindex)", name: noindex, widget: boolean, default: false }
      - { label: "Alte SEO-Beschreibung (deprecated)", name: "seoDescription", widget: "text", required: false, hint: "Nicht mehr nötig — benutze das SEO-Panel oben." }
      - { label: "Haupttext / Zusatzinhalt", name: "body", widget: "markdown" }

  # ─── SEITEN-INHALTE ───────────────────────────────────────────────────────
  - name: pages
    label: "Seiten"
    label_singular: "Seite"
    editor:
      preview: false
    files:
      - name: home
        label: "Startseite"
        file: "src/content/pages/home.yml"
        fields:
          - label: "Hero-Bereich"
            name: hero
            widget: object
            fields:
              - { label: "Vorzeile (Eyebrow)", name: eyebrow, widget: string, required: false, hint: "Kleine Zeile über dem Titel" }
              - { label: "Titel", name: title, widget: string }
              - { label: "Titel-Akzent (zweite Zeile)", name: titleAccent, widget: string, required: false, hint: "Wird grün dargestellt" }
              - { label: "Untertitel", name: subtitle, widget: text, required: false }
              - { label: "Portrait-Bild", name: image, widget: image, required: false }
              - { label: "Portrait Alt-Text", name: imageAlt, widget: string, required: false }
              - { label: "Post-it Spruch", name: postit, widget: text, required: false, hint: "Handgeschriebene Notiz neben dem Portrait" }
          - label: "Leistungen (3 Spalten)"
            name: services
            widget: list
            summary: "{{title}}"
            fields:
              - { label: "Icon (Material Symbols Name)", name: icon, widget: string, hint: "z. B. edit_note, forum, architecture — siehe fonts.google.com/icons" }
              - { label: "Titel", name: title, widget: string }
              - { label: "Beschreibung", name: description, widget: text }
              - label: "Aufzählungspunkte"
                name: items
                widget: list
                field: { label: "Punkt", name: item, widget: string }
          - label: "Call-to-Action unten"
            name: cta
            widget: object
            required: false
            fields:
              - { label: "Titel", name: title, widget: string }
              - { label: "Text", name: text, widget: text, required: false }
              - { label: "Button-Beschriftung", name: buttonText, widget: string, required: false }
          - label: "SEO & Social Sharing"
            name: seo
            widget: object
            required: false
            collapsed: true
            summary: "{{metaTitle}}"
            fields:
              - { label: "Meta-Titel", name: metaTitle, widget: string, required: false, hint: "50–60 Zeichen. Fallback: Seitentitel." }
              - { label: "Meta-Beschreibung", name: metaDescription, widget: text, required: false, hint: "150–160 Zeichen." }
              - { label: "Teilen-Bild (Open Graph)", name: ogImage, widget: image, required: false, hint: "1200×630 px empfohlen." }
              - { label: "Von Suchmaschinen ausschließen (noindex)", name: noindex, widget: boolean, default: false }

      - name: about
        label: "Über Mich"
        file: "src/content/pages/about.yml"
        fields:
          - label: "Hero-Bereich"
            name: hero
            widget: object
            fields:
              - { label: "Vorzeile", name: eyebrow, widget: string, required: false }
              - { label: "Titel", name: title, widget: string }
              - { label: "Titel-Akzent", name: titleAccent, widget: string, required: false }
              - label: "Einleitungstext (mehrere Absätze)"
                name: intro
                widget: list
                field: { label: "Absatz", name: paragraph, widget: text }
              - { label: "Portrait-Bild", name: image, widget: image, required: false }
              - { label: "Portrait Alt-Text", name: imageAlt, widget: string, required: false }
              - { label: "Standort-Notiz", name: location, widget: text, required: false, hint: "z. B. 'Berlin & Hamburg'" }
          - label: "Grundüberzeugungen"
            name: principles
            widget: list
            summary: "{{title}}"
            fields:
              - { label: "Icon", name: icon, widget: string }
              - { label: "Titel", name: title, widget: string }
              - { label: "Beschreibung", name: description, widget: text }
          - label: "Werdegang / Timeline"
            name: timeline
            widget: list
            summary: "{{year}} — {{title}}"
            fields:
              - { label: "Jahr / Zeitraum", name: year, widget: string }
              - { label: "Titel", name: title, widget: string }
              - { label: "Beschreibung", name: description, widget: text }
          - label: "Call-to-Action unten"
            name: cta
            widget: object
            required: false
            fields:
              - { label: "Titel", name: title, widget: string }
              - { label: "Text", name: text, widget: text, required: false }
              - { label: "Button-Beschriftung", name: buttonText, widget: string, required: false }
          - label: "SEO & Social Sharing"
            name: seo
            widget: object
            required: false
            collapsed: true
            summary: "{{metaTitle}}"
            fields:
              - { label: "Meta-Titel", name: metaTitle, widget: string, required: false }
              - { label: "Meta-Beschreibung", name: metaDescription, widget: text, required: false }
              - { label: "Teilen-Bild (Open Graph)", name: ogImage, widget: image, required: false }
              - { label: "Von Suchmaschinen ausschließen (noindex)", name: noindex, widget: boolean, default: false }

      - name: contact
        label: "Kontakt"
        file: "src/content/pages/contact.yml"
        fields:
          - label: "Hero-Bereich"
            name: hero
            widget: object
            fields:
              - { label: "Vorzeile", name: eyebrow, widget: string, required: false }
              - { label: "Titel", name: title, widget: string }
              - { label: "Untertitel", name: subtitle, widget: text, required: false }
          - { label: "Post-it Status", name: postit, widget: text, required: false, hint: "Handgeschriebene Notiz zur aktuellen Verfügbarkeit" }
          - label: "Verfügbarkeit (Quartale)"
            name: availability
            widget: list
            summary: "{{period}} — {{status}}"
            fields:
              - { label: "Zeitraum", name: period, widget: string, hint: "z. B. Q3 2026" }
              - { label: "Status-Text", name: status, widget: string }
              - label: "Farbe"
                name: tone
                widget: select
                options: ["busy", "partial", "open"]
                default: open
                hint: "busy = rot · partial = gelb · open = grün"
          - label: "Direktkontakt"
            name: contact
            widget: object
            required: false
            fields:
              - { label: "E-Mail", name: email, widget: string, required: false }
              - { label: "Telefon", name: phone, widget: string, required: false }
          - label: "SEO & Social Sharing"
            name: seo
            widget: object
            required: false
            collapsed: true
            summary: "{{metaTitle}}"
            fields:
              - { label: "Meta-Titel", name: metaTitle, widget: string, required: false }
              - { label: "Meta-Beschreibung", name: metaDescription, widget: text, required: false }
              - { label: "Teilen-Bild (Open Graph)", name: ogImage, widget: image, required: false }
              - { label: "Von Suchmaschinen ausschließen (noindex)", name: noindex, widget: boolean, default: false }

  # ─── NACHRICHTEN (vom Kontakt-Formular) ──────────────────────────────────
  - name: submissions
    label: "Nachrichten"
    label_singular: "Nachricht"
    description: "Eingegangene Anfragen aus dem Kontakt-Formular. Können gelesen und gelöscht werden."
    folder: "src/content/submissions"
    create: false
    delete: true
    extension: md
    format: frontmatter
    summary: "{{fields.date}} — {{fields.name}} ({{fields.topic}})"
    sortable_fields: ["date", "name"]
    fields:
      - { label: "Datum", name: date, widget: datetime }
      - { label: "Name", name: name, widget: string }
      - { label: "E-Mail", name: email, widget: string }
      - { label: "Thema", name: topic, widget: string, required: false }
      - { label: "User-Agent", name: userAgent, widget: string, required: false }
      - { label: "Nachricht", name: body, widget: text }

  # ─── GLOBALE EINSTELLUNGEN ────────────────────────────────────────────────
  - name: settings
    label: "Einstellungen"
    editor:
      preview: false
    files:
      - name: site
        label: "Seite & Footer"
        file: "src/content/settings/site.yml"
        fields:
          - { label: "Seitenname", name: siteName, widget: string, default: "Feiste Dialoge" }
          - { label: "Haupt-Tagline", name: tagline, widget: string, required: false, hint: "Wird im <title>-Tag verwendet" }
          - { label: "SEO-Beschreibung", name: description, widget: text, required: false }
          - { label: "Footer-Tagline", name: footerTagline, widget: text, required: false }
          - { label: "Footer-Unterzeile", name: footerSubline, widget: string, required: false, hint: "z. B. 'Dialogbuch · Dramaturgie · Synchronregie'" }
          - { label: "Copyright-Zusatz", name: copyright, widget: string, required: false, hint: "Erscheint hinter dem © {Jahr}" }
          - { label: "Kontakt-E-Mail", name: contactEmail, widget: string, required: false }
          - { label: "Kontakt-Telefon", name: contactPhone, widget: string, required: false }
          - { label: "Default Teilen-Bild (Open Graph)", name: defaultOgImage, widget: image, required: false, hint: "Wird benutzt, wenn eine Seite kein eigenes Teilen-Bild hat. 1200×630 px empfohlen." }
          - { label: "Google Search Console Verification-Code", name: googleSiteVerification, widget: string, required: false, hint: "Nur den Wert aus dem 'content'-Attribut einfügen." }
          - { label: "Name (für strukturierte Daten)", name: personName, widget: string, required: false, default: "Florian Feiste", hint: "Wird in JSON-LD Person-Schema verwendet." }
          - { label: "Jobtitel (für strukturierte Daten)", name: personJobTitle, widget: string, required: false, default: "Dialogbuchautor & Dramaturg" }
          - label: "Profil-Links (JSON-LD sameAs)"
            name: sameAs
            widget: list
            required: false
            default: []
            hint: "z. B. LinkedIn, IMDb, Xing — jeweils volle URL."
            field: { label: "URL", name: url, widget: string }
