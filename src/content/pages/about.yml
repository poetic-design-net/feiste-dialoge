hero:
  eyebrow: Über mich
  title: Florian Feist
  titleAccent: Worte als Handwerk.
  intro:
    - "Angefangen hat alles in Hamburg mit Hip-Hop und der Liebe zu Texten, die
      sitzen. Über die Jahre habe ich mich durch so ziemlich alles
      durchgearbeitet, was mit Wort und Klang zu tun hat: vom Werbetexten über
      die Musikproduktion und die Arbeit als Tonmeister bis hin zum Synchroncut.
      Diese Stationen waren für mich wie eine lange Schule für das richtige
      Timing und den passenden Tonfall. Heute bringe ich diese Erfahrung in
      meine Dialogbücher ein. Mir geht es darum, dass Texte nicht nur übersetzt
      wirken, sondern so klingen, wie echte Menschen eben sprechen – lebendig,
      direkt und authentisch."
  location: Berlin - schreiben weltweit
  image: /uploads/img_5453ed1.jpg
principles:
  - icon: record_voice_over
    title: Jede Figur hat ihre eigene Stimme
    description: Dialog ist mehr als Information. Dialog ist Charakter, Rhythmus,
      Subtext — und manchmal das, was nicht gesagt wird.
  - icon: trending_flat
    title: Struktur vor Stil
    description: Die beste Zeile trägt nichts, wenn der Bogen nicht stimmt. Ich
      denke immer in Szene, Akt und Gesamterzählung.
  - icon: handshake
    title: Kollaboration auf Augenhöhe
    description: Regie, Produktion, Lektorat — gute Arbeit entsteht im Dialog. Ich
      höre zu, bevor ich schreibe.
timeline: []
cta:
  title: Geben wir den Bildern eine Stimme!
  text: Ob für die große Leinwand oder Streaming. Ob Koreanisch oder Spanisch.
    Sorgen wir gemeinsam dafür, dass die Charaktere im Deutschen genau den
    richtigen Ton treffen.
  buttonText: Kontakt aufnehmen
seo:
  noindex: true
  metaTitle: Dialogbuchautor, Synchronautor, Synchron, Regie, Synchron Cut, Synchronstudio
  metaDescription: Sie suchen Dialogbücher, die klingen wie echtes Leben? Als
    ehemaliger Tonmeister und Werbetexter verbinde ich technisches
    Präzisionshandwerk mit kreativem Wortwitz für Ihr Projekt.
